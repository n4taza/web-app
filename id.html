<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Katalog ID — IDglitxh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --bg2:#111111;
  --card:#161616;
  --card2:#1a1a1a;
  --border:#232323;
  --border2:#2a2a2a;
  --text:#f0f0f0;
  --muted:#666;
  --muted2:#888;
  --white:#fff;
  --low:#6b7280;
  --medium:#3b82f6;
  --high:#f97316;
  --legend:#eab308;
  --sold:#ef4444;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono',monospace,'Courier New';
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;background:rgba(13,13,13,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-back{display:flex;align-items:center;gap:6px;color:var(--muted2);text-decoration:none;font-size:.8rem;font-weight:500;padding:.3rem .7rem;border-radius:8px;border:1px solid var(--border);background:var(--card);transition:all .2s;white-space:nowrap}
.nav-back:hover{color:var(--white);border-color:var(--border2)}
.nav-back svg{width:14px;height:14px}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:.9rem;font-weight:700;color:var(--white);letter-spacing:-0.3px}
.nav-logo-icon{width:22px;height:22px;background:var(--white);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#000;font-weight:900}
.nav-right-info{font-family:var(--mono);font-size:.65rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.live-dot{width:5px;height:5px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* PAGE HEADER */
.ph{position:relative;z-index:1;padding:80px 32px 32px;border-bottom:1px solid var(--border);max-width:1200px;margin:0 auto}
.ph-pill{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border2);padding:.25rem .75rem;border-radius:99px;font-size:.68rem;font-weight:500;color:var(--muted2);margin-bottom:16px}
.ph-title{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;letter-spacing:-1.5px;line-height:1.1;color:var(--white);margin-bottom:8px}
.ph-title span{color:var(--muted)}
.ph-sub{font-size:.8rem;color:var(--muted);font-family:var(--mono);letter-spacing:-0.2px}

/* FILTER BAR */
.filter-bar{position:sticky;top:56px;z-index:150;background:rgba(13,13,13,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;align-items:center}
.filter-bar::-webkit-scrollbar{display:none}
.fl{font-size:.65rem;color:var(--muted);font-weight:500;white-space:nowrap;flex-shrink:0;margin-right:4px}
.fb{background:var(--card);border:1px solid var(--border2);color:var(--muted2);padding:.32rem .85rem;border-radius:8px;cursor:pointer;font-family:var(--font);font-size:.75rem;font-weight:500;transition:all .15s;white-space:nowrap;flex-shrink:0}
.fb:hover{border-color:var(--border2);color:var(--white);background:var(--card2)}
.fb.act{background:var(--white);border-color:var(--white);color:#000;font-weight:600}
.fb.sold-btn.act{background:var(--sold);border-color:var(--sold);color:#fff}

/* SEARCH */
.search-section{position:sticky;top:105px;z-index:149;background:rgba(13,13,13,.95);backdrop-filter:blur(16px);padding:10px 32px;border-bottom:1px solid var(--border)}
.search-wrap{position:relative;max-width:440px;margin:0 auto}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:.5rem .9rem .5rem 2.4rem;color:var(--text);font-family:var(--mono);font-size:.78rem;font-weight:400;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:rgba(255,255,255,.2)}
.search-wrap input::placeholder{color:var(--muted);font-family:var(--mono);font-weight:400}
.si{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}

/* TOOLBAR */
.toolbar{position:relative;z-index:1;padding:10px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--border)}
.ri{font-size:.75rem;color:var(--muted);font-family:var(--mono);font-weight:400}
.ri span{color:var(--text);font-weight:600}
.sold-leg{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--muted);font-family:var(--mono);font-weight:400}
.sold-dot{width:6px;height:6px;border-radius:50%;background:var(--sold);flex-shrink:0}

/* MAIN */
.main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 32px 80px}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;gap:14px}
.spinner{width:32px;height:32px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--white);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:.75rem;color:var(--muted);font-family:var(--mono);font-weight:400}

/* TIER GROUP */
.sg{margin-bottom:40px}
.gh{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.gtier-name{font-size:1.2rem;font-weight:700;letter-spacing:-0.5px;color:var(--white)}
.glevel{font-size:.6rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:.22rem .65rem;border-radius:6px;border:1px solid}
.gcnt{font-size:.7rem;color:var(--muted);font-family:var(--mono);font-weight:400;margin-left:auto;letter-spacing:-0.2px}
.gcnt b{color:var(--white);font-weight:600}

/* TIER BADGE COLORS */
.tier-low-badge{background:rgba(107,114,128,.08);border-color:rgba(107,114,128,.2);color:var(--low)}
.tier-medium-badge{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.2);color:var(--medium)}
.tier-high-badge{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.2);color:var(--high)}
.tier-legend-badge{background:rgba(234,179,8,.08);border-color:rgba(234,179,8,.2);color:var(--legend)}
.tier-low{color:var(--low)}
.tier-medium{color:var(--medium)}
.tier-high{color:var(--high)}
.tier-legend{color:var(--legend)}

/* ID GRID */
.id-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
@media(max-width:480px){.id-grid{grid-template-columns:repeat(2,1fr)}}

/* ID CARD */
.id-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:fi .2s ease both}
.id-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,rgba(255,255,255,.1));opacity:.5;transition:opacity .2s}
.id-card:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.id-card:hover::before{opacity:1}
.id-card.is-sold{border-color:rgba(239,68,68,.15);background:rgba(239,68,68,.03);cursor:default;opacity:.6}
.id-card.is-sold:hover{transform:none;box-shadow:none;background:rgba(239,68,68,.03)}
.id-num{font-family:var(--mono);font-size:.8rem;font-weight:400;color:var(--text);word-break:break-all;line-height:1.4;letter-spacing:-0.3px}
.id-card.is-sold .id-num{color:var(--muted);text-decoration:line-through}
.id-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:.55rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:.18rem .5rem;border-radius:4px;line-height:1}
.tag-sold{background:rgba(239,68,68,.1);color:var(--sold);border:1px solid rgba(239,68,68,.2)}
.tag-new{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.tag-con{background:rgba(255,255,255,.05);color:var(--muted2);border:1px solid rgba(255,255,255,.08);font-size:.52rem;display:inline-flex;align-items:center;gap:3px}
.tag-con img{width:10px;height:10px;border-radius:50%;object-fit:cover}
.tag-verified{background:rgba(234,179,8,.1);color:#fbbf24;border:1px solid rgba(234,179,8,.2);display:inline-flex;align-items:center;gap:3px}
.tag-verified img{width:10px;height:10px;object-fit:contain}

/* SOLD RIBBON */
.sold-ribbon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-15deg);background:rgba(239,68,68,.9);color:#fff;font-size:.55rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:.2rem .7rem;border-radius:4px;white-space:nowrap;pointer-events:none;backdrop-filter:blur(4px);font-family:var(--mono)}

@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* PAGINATION */
.pag{display:flex;gap:4px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.pn{min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--border2);background:var(--card);font-size:.72rem;font-family:var(--mono);font-weight:500;cursor:pointer;transition:all .15s;color:var(--muted);padding:0 8px}
.pn:hover{border-color:rgba(255,255,255,.2);color:var(--white)}
.pn.act{background:var(--white);border-color:var(--white);color:#000;font-weight:700}

/* EMPTY */
.empty{text-align:center;padding:60px 16px;color:var(--muted)}
.empty-ico{font-size:2rem;margin-bottom:12px}
.empty-t{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-0.3px}
.empty-s{font-size:.8rem;font-weight:400}
mark{background:rgba(255,255,255,.1);color:var(--white);border-radius:2px;padding:0 2px;font-weight:500}

@media(max-width:768px){
  nav{padding:0 16px}
  .ph{padding:76px 16px 24px}
  .filter-bar{padding:10px 16px}
  .search-section{padding:10px 16px}
  .toolbar{padding:10px 16px}
  .main{padding:16px 16px 60px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Kembali
    </a>
    <div class="nav-logo">
      <div class="nav-logo-icon">ID</div>
      IDglitxh
    </div>
  </div>
  <div class="nav-right-info">
    <div class="live-dot"></div>
    Live Data
  </div>
</nav>

<div class="ph">
  <div class="ph-pill">• Katalog Lengkap</div>
  <h1 class="ph-title">Semua <span>ID</span> Tersedia</h1>
  <p class="ph-sub" id="phSub">Memuat data...</p>
</div>

<div class="filter-bar">
  <span class="fl">Filter</span>
  <button class="fb act" data-t="all" onclick="setF('all')">Semua</button>
  <button class="fb" data-t="low" onclick="setF('low')">Low</button>
  <button class="fb" data-t="medium" onclick="setF('medium')">Medium</button>
  <button class="fb" data-t="high" onclick="setF('high')">High</button>
  <button class="fb" data-t="legend" onclick="setF('legend')">Legend</button>
  <button class="fb sold-btn" data-t="sold" onclick="setF('sold')">Sold</button>
</div>

<div class="search-section">
  <div class="search-wrap">
    <span class="si">⌕</span>
    <input type="text" id="gSearch" placeholder="Cari ID..." autocomplete="off"/>
  </div>
</div>

<div class="toolbar">
  <div class="ri" id="ri">Memuat...</div>
  <div class="sold-leg"><span class="sold-dot"></span>ID yang sudah terjual</div>
</div>

<div class="main" id="main">
  <div class="loader"><div class="spinner"></div><div class="lt">Mengambil data...</div></div>
</div>

<script>
const TIERS=[
  {name:'Low',level:'LOW — BASIC',url:'https://raw.githubusercontent.com/n4taza/web-app/main/ID/low.json',color:'rgba(107,114,128,.6)',badgeClass:'tier-low-badge',textClass:'tier-low'},
  {name:'Medium',level:'MEDIUM — STANDARD',url:'https://raw.githubusercontent.com/n4taza/web-app/main/ID/medium.json',color:'rgba(59,130,246,.7)',badgeClass:'tier-medium-badge',textClass:'tier-medium'},
  {name:'High',level:'HIGH — PREMIUM',url:'https://raw.githubusercontent.com/n4taza/web-app/main/ID/high.json',color:'rgba(249,115,22,.7)',badgeClass:'tier-high-badge',textClass:'tier-high'},
  {name:'Legend',level:'LEGEND — ULTIMATE',url:'https://raw.githubusercontent.com/n4taza/web-app/main/ID/legend.json',color:'rgba(234,179,8,.7)',badgeClass:'tier-legend-badge',textClass:'tier-legend'}
];

const PAGE_SIZE=200;
const CON_JSON='https://raw.githubusercontent.com/n4taza/web-app/main/contributor/contributor.json';
const BASE_RAW='https://raw.githubusercontent.com/n4taza/web-app/main';
const VERIFIED_ICON_URL='https://img.icons8.com/?size=100&id=98A4yZTt9abw&format=png&color=000000';

let allData={};
let soldSet=new Set();
let newSet=new Set();
let activeF='all';
let searchQ='';
let curPage={};
let idToContributor={};
let contributorVerifiedMap={}; // username -> verified status

async function fetchTierData(url){
  try{
    const r=await fetch(url+'?_='+Date.now());
    if(!r.ok)throw new Error();
    const t=await r.text();
    try{const p=JSON.parse(t);if(Array.isArray(p))return p.filter(s=>s&&s.trim())}catch(e){}
    return t.trim().split('\n').map(x=>x.trim()).filter(Boolean);
  }catch{return[]}
}

async function fetchJSON(url){
  try{
    const r=await fetch(url+'?_='+Date.now());
    if(!r.ok)return null;
    return JSON.parse(await r.text());
  }catch{return null;}
}

async function buildIdContributorMap(contributors){
  // Build verified map
  contributors.forEach(con=>{
    contributorVerifiedMap[con.username]=con.verified===true;
  });
  
  await Promise.all(contributors.map(async con=>{
    const data=await fetchJSON(`${BASE_RAW}/ID/id-${con.username}.json`);
    if(Array.isArray(data)){
      data.forEach(id=>{
        const sid=String(id).trim();
        if(sid && !idToContributor[sid]){
          idToContributor[sid]={
            name:con.name,
            username:con.username,
            photo:con.photo||'',
            verified:con.verified===true
          };
        }
      });
    }
  }));
}

async function init(){
  const res=await Promise.all(TIERS.map(t=>fetchTierData(t.url)));
  TIERS.forEach((t,i)=>{allData[t.name]=res[i];curPage[t.name]=1});

  try{
    const sr=await fetch('https://raw.githubusercontent.com/n4taza/web-app/main/ID/sold.json?_='+Date.now());
    if(sr.ok){const st=await sr.text();try{const p=JSON.parse(st);if(Array.isArray(p))p.forEach(n=>soldSet.add(n))}catch(e){st.trim().split('\n').forEach(n=>{if(n.trim())soldSet.add(n.trim())})}}
  }catch{}

  try{
    const nr=await fetch('https://raw.githubusercontent.com/n4taza/web-app/main/ID/new.json?_='+Date.now());
    if(nr.ok){const nt=await nr.text();try{const p=JSON.parse(nt);if(Array.isArray(p))p.forEach(n=>newSet.add(n))}catch(e){nt.trim().split('\n').forEach(n=>{if(n.trim())newSet.add(n.trim())})}}
  }catch{}

  try{
    const conData=await fetchJSON(CON_JSON);
    if(Array.isArray(conData)&&conData.length>0){
      await buildIdContributorMap(conData);
    }
  }catch(e){console.warn('contributor fetch failed',e)}

  const total=Object.values(allData).flat().length;
  document.getElementById('phSub').innerHTML=`${total.toLocaleString('id-ID')} ID total · ${soldSet.size} terjual · ${newSet.size} baru · ${Object.keys(idToContributor).length} ID terhubung contributor`;

  const urlParams=new URLSearchParams(window.location.search);
  const tierParam=urlParams.get('tier');
  if(tierParam){
    const v=TIERS.find(t=>t.name.toLowerCase()===tierParam.toLowerCase());
    if(v)setF(v.name.toLowerCase());else setF('all');
  }else{render()}
}

function setF(filter){
  activeF=filter;searchQ='';
  document.getElementById('gSearch').value='';
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('act',b.dataset.t===filter));
  TIERS.forEach(t=>{curPage[t.name]=1});
  render();
}

document.getElementById('gSearch').addEventListener('input',function(e){
  searchQ=e.target.value.trim();
  TIERS.forEach(t=>{curPage[t.name]=1});
  render();
});

function getFilteredData(){
  let tiersToShow=activeF==='all'||activeF==='sold'?TIERS.map(t=>t.name):(()=>{const m=TIERS.find(t=>t.name.toLowerCase()===activeF.toLowerCase());return m?[m.name]:TIERS.map(t=>t.name)})();
  const result={};
  for(const tn of tiersToShow){
    let ids=[...(allData[tn]||[])];
    if(activeF==='sold')ids=ids.filter(id=>soldSet.has(id));
    if(searchQ.length>=2)ids=ids.filter(id=>id.toLowerCase().includes(searchQ.toLowerCase()));
    if(ids.length>0)result[tn]=ids;
  }
  return result;
}

function render(){
  const filtered=getFilteredData();
  const main=document.getElementById('main');
  let total=0;
  Object.values(filtered).forEach(arr=>total+=arr.length);
  document.getElementById('ri').innerHTML=`Menampilkan <span>${total.toLocaleString('id-ID')}</span> ID`;

  if(total===0){
    main.innerHTML=`<div class="empty"><div class="empty-ico">🔍</div><div class="empty-t">Tidak ada hasil</div><div class="empty-s">Coba ubah filter atau kata kunci pencarian.</div></div>`;
    return;
  }

  main.innerHTML='';
  const order=['Low','Medium','High','Legend'];
  const sorted=Object.keys(filtered).sort((a,b)=>order.indexOf(a)-order.indexOf(b));

  for(const tn of sorted){
    const tier=TIERS.find(t=>t.name===tn);
    const ids=filtered[tn];
    const cp=curPage[tn]||1;
    const start=(cp-1)*PAGE_SIZE;
    const pageIds=ids.slice(start,start+PAGE_SIZE);
    const totalPages=Math.ceil(ids.length/PAGE_SIZE);

    const groupDiv=document.createElement('div');
    groupDiv.className='sg';groupDiv.id=`g-${tn.toLowerCase()}`;
    groupDiv.innerHTML=`
      <div class="gh">
        <span class="gtier-name">${tn}</span>
        <span class="glevel ${tier.badgeClass}">${tier.level}</span>
        <span class="gcnt"><b>${pageIds.length}</b> / ${ids.length} ID</span>
      </div>`;

    const grid=document.createElement('div');
    grid.className='id-grid';

    pageIds.forEach((id,idx)=>{
      const isSold=soldSet.has(id);
      const isNew=newSet.has(id)&&!isSold;
      const con=idToContributor[String(id).trim()];
      const isVerifiedContributor=con?.verified===true;
      
      const card=document.createElement('div');
      card.className=`id-card${isSold?' is-sold':''}`;
      card.style.setProperty('--cc',tier.color);
      card.style.animationDelay=`${Math.min(idx*6,180)}ms`;

      let displayId=id;
      if(searchQ.length>=2){
        const rx=new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        displayId=id.replace(rx,'<mark>$1</mark>');
      }

      let tags='';
      if(isSold)tags+=`<span class="tag tag-sold">SOLD</span>`;
      if(isNew)tags+=`<span class="tag tag-new">NEW</span>`;
      if(con){
        const avatarHtml=con.photo?`<img src="${con.photo}" onerror="this.style.display='none'">`:'';
        tags+=`<span class="tag tag-con">${avatarHtml}${con.name}</span>`;
      }
      if(isVerifiedContributor){
        tags+=`<span class="tag tag-verified"><img src="${VERIFIED_ICON_URL}" alt="✓"/>DV</span>`;
      }

      card.innerHTML=`
        ${isSold?'<div class="sold-ribbon">SOLD</div>':''}
        <div class="id-num">${displayId}</div>
        ${tags?`<div class="id-tags">${tags}</div>`:''}`;

      if(!isSold){
        card.onclick=()=>{window.location.href=`payment.html?id=${encodeURIComponent(id)}&tier=${tn.toLowerCase()}`};
        card.style.cursor='pointer';
      }
      grid.appendChild(card);
    });

    groupDiv.appendChild(grid);

    if(totalPages>1){
      const pagDiv=document.createElement('div');
      pagDiv.className='pag';
      const max=7;
      let sp=Math.max(1,cp-3),ep=Math.min(totalPages,sp+max-1);
      if(ep-sp<max-1)sp=Math.max(1,ep-max+1);

      if(sp>1){
        addPB(pagDiv,1,cp,tn);
        if(sp>2){const d=document.createElement('div');d.className='pn';d.textContent='···';d.style.cursor='default';pagDiv.appendChild(d)}
      }
      for(let i=sp;i<=ep;i++)addPB(pagDiv,i,cp,tn);
      if(ep<totalPages){
        if(ep<totalPages-1){const d=document.createElement('div');d.className='pn';d.textContent='···';d.style.cursor='default';pagDiv.appendChild(d)}
        addPB(pagDiv,totalPages,cp,tn);
      }
      groupDiv.appendChild(pagDiv);
    }
    main.appendChild(groupDiv);
  }
}

function addPB(container,pn,cp,tn){
  const b=document.createElement('div');
  b.className=`pn${pn===cp?' act':''}`;
  b.textContent=pn;
  b.onclick=()=>{curPage[tn]=pn;render();document.getElementById(`g-${tn.toLowerCase()}`).scrollIntoView({behavior:'smooth',block:'start'})};
  container.appendChild(b);
}

init();
</script>
