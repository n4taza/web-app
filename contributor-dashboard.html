<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contributor Dashboard — IDglitxh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--card:#161616;--card2:#1a1a1a;--border:#232323;--border2:#2a2a2a;
  --text:#f0f0f0;--muted:#666;--muted2:#888;--white:#fff;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
  --font:'Inter',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  overflow-x:hidden;
}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(13,13,13,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:.9rem;font-weight:700;color:var(--white)}
.nav-logo-icon{width:22px;height:22px;background:var(--white);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#000;font-weight:900}
.nav-user{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border2);border-radius:30px;padding:.2rem .2rem .2rem 12px;cursor:pointer}
.nav-user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover}
.nav-user-name{font-size:.75rem;font-weight:500;color:var(--white)}
.btn-logout{background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:8px;padding:.3rem .8rem;font-size:.7rem;color:var(--muted2);cursor:pointer}
.btn-logout:hover{color:var(--white);border-color:rgba(255,255,255,.2)}

/* MAIN */
.wrap{max-width:1000px;margin:0 auto;padding:80px 24px 40px}
.page-header{margin-bottom:28px}
.page-pill{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border2);padding:.25rem .75rem;border-radius:99px;font-size:.67rem;color:var(--muted2);margin-bottom:14px}
.page-title{font-size:clamp(1.4rem,4vw,1.8rem);font-weight:700;letter-spacing:-1px;color:var(--white);margin-bottom:6px}
.page-sub{font-size:.78rem;color:var(--muted2);line-height:1.6}

/* PANEL */
.panel{background:var(--card);border:1px solid var(--border2);border-radius:20px;overflow:hidden;margin-bottom:24px}
.panel-header{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.ph-icon{width:32px;height:32px;border-radius:8px;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center}
.ph-icon svg{width:15px;height:15px;stroke:var(--muted2)}
.ph-title{font-size:.88rem;font-weight:600;color:var(--white)}
.panel-body{padding:20px}

/* FORM */
.field{margin-bottom:14px}
label{display:block;font-size:.7rem;font-weight:500;color:var(--muted2);margin-bottom:6px}
input,textarea,select{
  width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:10px;
  padding:.58rem .85rem;color:var(--text);font-family:var(--mono);font-size:.78rem;
  outline:none;
}
textarea{resize:vertical;min-height:100px}
.btn{width:100%;padding:11px;border-radius:10px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;background:var(--white);color:#000}
.btn:hover{background:#e8e8e8}

/* ID GRID */
.id-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:12px}
.id-card{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px}
.id-code{font-family:var(--mono);font-size:.72rem;color:var(--text);word-break:break-all}
.id-status{font-size:.55rem;font-weight:600;padding:.12rem .4rem;border-radius:4px;width:fit-content;margin-top:6px}
.status-available{background:rgba(16,185,129,.1);color:#10b981}
.status-sold{background:rgba(239,68,68,.1);color:#ef4444}
.id-btn{background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:.2rem .5rem;font-size:.6rem;cursor:pointer;margin-top:6px;width:100%}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:4px;margin-bottom:24px;width:fit-content}
.tab{font-size:.75rem;font-weight:500;padding:.4rem 1rem;border-radius:8px;cursor:pointer;color:var(--muted2)}
.tab.active{background:var(--white);color:#000}
.tab-content{display:none}
.tab-content.active{display:block}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:.75rem;display:flex;align-items:center;gap:8px;z-index:9999;transition:all .3s;opacity:0;transform:translateY(12px);pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok .toast-dot{background:var(--green)}
.toast.err .toast-dot{background:var(--red)}
.toast-dot{width:7px;height:7px;border-radius:50%}

/* PROFILE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0}
.modal-overlay.show{visibility:visible;opacity:1}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:24px;max-width:400px;width:90%}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}
.modal-body{padding:20px}
.profile-preview{display:flex;justify-content:center;margin-bottom:16px}
.profile-preview img{width:80px;height:80px;border-radius:50%;object-fit:cover}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><div class="nav-logo-icon">ID</div>IDglitxh</div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="nav-user" id="navUserBtn">
      <img class="nav-user-avatar" id="navAvatar" src="" alt="">
      <span class="nav-user-name" id="navName">Loading...</span>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="wrap">
  <div class="page-header">
    <div class="page-pill">• Contributor Dashboard</div>
    <h1 class="page-title">Welcome, <span id="welcomeName">---</span></h1>
    <p class="page-sub" id="userBio">Manage your ID contributions</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('add')">➕ Tambah ID</div>
    <div class="tab" onclick="switchTab('sold')">✅ Sold ID</div>
    <div class="tab" onclick="switchTab('myids')">📋 My IDs</div>
  </div>

  <div class="tab-content active" id="tab-add">
    <div class="panel">
      <div class="panel-header"><div class="ph-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg></div><div><div class="ph-title">Tambah ID Baru</div></div></div>
      <div class="panel-body">
        <div class="field"><label>Pilih Tier</label>
          <select id="addTier">
            <option value="low">Low — Basic</option>
            <option value="medium">Medium — Standard</option>
            <option value="high">High — Premium</option>
            <option value="legend">Legend — Ultimate</option>
          </select>
        </div>
        <div class="field"><label>Daftar ID (satu per baris)</label><textarea id="addIdList" rows="5" placeholder="ID001&#10;ID002"></textarea></div>
        <button class="btn" onclick="submitAddIDs()">➕ Tambah ID ke Tier</button>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-sold">
    <div class="panel">
      <div class="panel-header"><div class="ph-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div><div><div class="ph-title">Tandai ID Sold</div></div></div>
      <div class="panel-body">
        <div class="field"><label>ID yang Terjual (satu per baris)</label><textarea id="soldIdList" rows="5" placeholder="ID001&#10;ID002"></textarea></div>
        <div class="field"><label>Pilih Tier Asal ID (opsional)</label><select id="soldTierSelect"><option value="">Tidak perlu</option><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option><option value="legend">Legend</option></select></div>
        <button class="btn" onclick="submitSoldIDs()">✅ Tandai sebagai Sold</button>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-myids">
    <div class="panel">
      <div class="panel-header"><div class="ph-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 7h-4.18A3 3 0 0 0 16 5.18V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v1.18A3 3 0 0 0 6.18 7H4"/><line x1="12" y1="2" x2="12" y2="22"/></svg></div><div><div class="ph-title">ID Saya</div><div class="ph-sub" id="myIdsCount">Memuat...</div></div></div>
      <div class="panel-body" id="myIdsContainer"><div style="text-align:center;padding:30px">Memuat ID...</div></div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-header"><span>Edit Profile</span><button class="modal-close" onclick="closeProfileModal()">✕</button></div>
    <div class="modal-body">
      <div class="profile-preview"><img id="modalProfilePreview" src=""></div>
      <div class="field"><label>URL Foto Profil</label><input type="url" id="editPhoto"></div>
      <div class="field"><label>Nama Tampil</label><input type="text" id="editName"></div>
      <div class="field"><label>Bio</label><textarea id="editBio" rows="3"></textarea></div>
      <button class="btn" onclick="saveProfile()">💾 Simpan Perubahan</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><div class="toast-dot"></div><div class="toast-msg"></div></div>

<script>
// ==================== KONFIGURASI ====================
const REPO = 'n4taza/web-app';
const BRANCH = 'main';
const BASE_RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const BASE_API = `https://api.github.com/repos/${REPO}/contents`;

let GH_TOKEN = '';
let currentUser = null;

const TIER_FILES = {low:'ID/low.json',medium:'ID/medium.json',high:'ID/high.json',legend:'ID/legend.json'};
const CON_FILE = 'contributor/contributor.json';
const SOLD_FILE = 'ID/sold.json';

// ==================== AUTH CHECK ====================
function checkAuth() {
  const savedUser = localStorage.getItem('contributor_user');
  if (!savedUser) {
    window.location.href = 'contributor-login.html';
    return false;
  }
  currentUser = JSON.parse(savedUser);
  document.getElementById('welcomeName').textContent = currentUser.name;
  document.getElementById('userBio').textContent = currentUser.bio || 'Manage your ID contributions';
  document.getElementById('navName').textContent = currentUser.name;
  document.getElementById('navAvatar').src = currentUser.photo || '';
  return true;
}

function logout() {
  localStorage.removeItem('contributor_user');
  window.location.href = 'contributor-login.html';
}

// ==================== GITHUB ====================
function getToken() {
  let token = localStorage.getItem('gh_token');
  if (!token) {
    token = prompt('🔐 Masukkan GitHub Personal Access Token:\n\nToken diperlukan untuk mengakses repository.\n\nMinimal scope: repo');
    if (token && token.trim()) localStorage.setItem('gh_token', token.trim());
  }
  return token;
}

function ghHeaders() {
  return { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' };
}

async function ghGet(path) {
  try {
    const res = await fetch(`${BASE_API}/${path}?ref=${BRANCH}`, { headers: ghHeaders() });
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function ghPut(path, content, message, sha) {
  try {
    const body = { message, content: btoa(unescape(encodeURIComponent(content))), branch: BRANCH };
    if (sha) body.sha = sha;
    const res = await fetch(`${BASE_API}/${path}`, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
    return res.ok;
  } catch { return false; }
}

async function readJSON(path) {
  try {
    const res = await fetch(`${BASE_RAW}/${path}?_=${Date.now()}`);
    if (!res.ok) return { data: [], sha: null };
    const text = await res.text();
    const meta = await ghGet(path);
    return { data: JSON.parse(text), sha: meta?.sha || null };
  } catch { return { data: [], sha: null }; }
}

async function writeJSON(path, data, message) {
  const meta = await ghGet(path);
  const sha = meta?.sha || null;
  return await ghPut(path, JSON.stringify(data, null, 2), message, sha);
}

async function fetchContributors() {
  const { data } = await readJSON(CON_FILE);
  return Array.isArray(data) ? data : [];
}

async function saveContributors(contributors, msg) {
  return await writeJSON(CON_FILE, contributors, msg);
}

// ==================== DASHBOARD FUNCTIONS ====================
async function loadMyIds() {
  const myIdFile = `ID/id-${currentUser.username}.json`;
  const { data: myIds } = await readJSON(myIdFile);
  const soldFile = `ID/sold-id-${currentUser.username}.json`;
  const { data: soldIds } = await readJSON(soldFile);
  const soldSet = new Set(soldIds || []);
  
  const container = document.getElementById('myIdsContainer');
  const countSpan = document.getElementById('myIdsCount');
  
  if (!myIds || myIds.length === 0) {
    countSpan.textContent = '0 ID';
    container.innerHTML = '<div style="text-align:center;padding:30px">Belum ada ID</div>';
    return;
  }
  
  countSpan.textContent = `${myIds.length} ID (${soldSet.size} sold)`;
  container.innerHTML = `<div class="id-grid">${myIds.map(id => `
    <div class="id-card">
      <div class="id-code">${escapeHtml(id)}</div>
      <div class="id-status ${soldSet.has(id) ? 'status-sold' : 'status-available'}">${soldSet.has(id) ? 'SOLD' : 'AVAILABLE'}</div>
      ${!soldSet.has(id) ? `<button class="id-btn" onclick="markSingleSold('${escapeHtml(id)}')">Mark Sold</button>` : ''}
    </div>
  `).join('')}</div>`;
}

async function submitAddIDs() {
  const tier = document.getElementById('addTier').value;
  const raw = document.getElementById('addIdList').value.trim();
  if (!tier) { toast('Pilih tier', 'err'); return; }
  if (!raw) { toast('Daftar ID kosong', 'err'); return; }
  
  const newIDs = [...new Set(raw.split('\n').map(l => l.trim()).filter(Boolean))];
  if (newIDs.length === 0) { toast('Tidak ada ID valid', 'err'); return; }
  
  toast(`Menambahkan ${newIDs.length} ID...`, 'ok');
  
  const { data: tierArr } = await readJSON(TIER_FILES[tier]);
  const mergedTier = [...new Set([...(tierArr || []), ...newIDs])];
  const ok1 = await writeJSON(TIER_FILES[tier], mergedTier, `add ${newIDs.length} IDs to ${tier} by ${currentUser.username}`);
  
  const myIdFile = `ID/id-${currentUser.username}.json`;
  const { data: myIds } = await readJSON(myIdFile);
  const mergedMy = [...new Set([...(myIds || []), ...newIDs])];
  const ok2 = await writeJSON(myIdFile, mergedMy, `add ${newIDs.length} IDs to ${currentUser.username}`);
  
  const contributors = await fetchContributors();
  const userIdx = contributors.findIndex(c => c.username === currentUser.username);
  if (userIdx !== -1) {
    contributors[userIdx].total = (contributors[userIdx].total || 0) + newIDs.length;
    await saveContributors(contributors, `update total for ${currentUser.username}`);
  }
  
  if (ok1 && ok2) {
    toast(`${newIDs.length} ID berhasil ditambahkan!`, 'ok');
    document.getElementById('addIdList').value = '';
    await loadMyIds();
  } else {
    toast('Gagal menyimpan ID', 'err');
  }
}

async function submitSoldIDs() {
  const raw = document.getElementById('soldIdList').value.trim();
  const tier = document.getElementById('soldTierSelect').value;
  if (!raw) { toast('Daftar ID sold kosong', 'err'); return; }
  
  const newSold = [...new Set(raw.split('\n').map(l => l.trim()).filter(Boolean))];
  if (newSold.length === 0) { toast('Tidak ada ID valid', 'err'); return; }
  
  toast(`Menandai ${newSold.length} ID sold...`, 'ok');
  
  const { data: globalSold } = await readJSON(SOLD_FILE);
  const mergedGlobal = [...new Set([...(globalSold || []), ...newSold])];
  await writeJSON(SOLD_FILE, mergedGlobal, `mark ${newSold.length} IDs as sold by ${currentUser.username}`);
  
  const soldUserFile = `ID/sold-id-${currentUser.username}.json`;
  const { data: userSold } = await readJSON(soldUserFile);
  const mergedUser = [...new Set([...(userSold || []), ...newSold])];
  await writeJSON(soldUserFile, mergedUser, `add ${newSold.length} sold IDs to ${currentUser.username}`);
  
  if (tier) {
    const { data: tierArr } = await readJSON(TIER_FILES[tier]);
    const filtered = tierArr.filter(id => !newSold.includes(id));
    await writeJSON(TIER_FILES[tier], filtered, `remove sold IDs from ${tier}`);
  }
  
  const myIdFile = `ID/id-${currentUser.username}.json`;
  const { data: myIds } = await readJSON(myIdFile);
  const filteredMy = myIds.filter(id => !newSold.includes(id));
  await writeJSON(myIdFile, filteredMy, `remove sold IDs from active list`);
  
  toast(`${newSold.length} ID ditandai sold!`, 'ok');
  document.getElementById('soldIdList').value = '';
  await loadMyIds();
}

async function markSingleSold(id) {
  toast(`Menandai ${id} sebagai sold...`, 'ok');
  
  const { data: globalSold } = await readJSON(SOLD_FILE);
  const mergedGlobal = [...new Set([...(globalSold || []), id])];
  await writeJSON(SOLD_FILE, mergedGlobal, `mark ${id} as sold by ${currentUser.username}`);
  
  const soldUserFile = `ID/sold-id-${currentUser.username}.json`;
  const { data: userSold } = await readJSON(soldUserFile);
  const mergedUser = [...new Set([...(userSold || []), id])];
  await writeJSON(soldUserFile, mergedUser, `add sold ID ${id} to ${currentUser.username}`);
  
  const myIdFile = `ID/id-${currentUser.username}.json`;
  const { data: myIds } = await readJSON(myIdFile);
  const filteredMy = myIds.filter(i => i !== id);
  await writeJSON(myIdFile, filteredMy, `remove sold ID ${id} from active list`);
  
  toast(`✅ ${id} ditandai sold`, 'ok');
  await loadMyIds();
}

// ==================== PROFILE ====================
function openProfileModal() {
  document.getElementById('modalProfilePreview').src = currentUser.photo || '';
  document.getElementById('editPhoto').value = currentUser.photo || '';
  document.getElementById('editName').value = currentUser.name || '';
  document.getElementById('editBio').value = currentUser.bio || '';
  document.getElementById('profileModal').classList.add('show');
}

function closeProfileModal() {
  document.getElementById('profileModal').classList.remove('show');
}

async function saveProfile() {
  const newPhoto = document.getElementById('editPhoto').value.trim();
  const newName = document.getElementById('editName').value.trim();
  const newBio = document.getElementById('editBio').value.trim();
  if (!newName) { toast('Nama tidak boleh kosong', 'err'); return; }
  
  const contributors = await fetchContributors();
  const userIdx = contributors.findIndex(c => c.username === currentUser.username);
  if (userIdx !== -1) {
    contributors[userIdx].photo = newPhoto;
    contributors[userIdx].name = newName;
    contributors[userIdx].bio = newBio;
    await saveContributors(contributors, `update profile for ${currentUser.username}`);
    
    currentUser.photo = newPhoto;
    currentUser.name = newName;
    currentUser.bio = newBio;
    localStorage.setItem('contributor_user', JSON.stringify(currentUser));
    
    document.getElementById('navName').textContent = newName;
    document.getElementById('navAvatar').src = newPhoto;
    document.getElementById('welcomeName').textContent = newName;
    document.getElementById('userBio').textContent = newBio;
  }
  closeProfileModal();
  toast('✅ Profile berhasil diupdate', 'ok');
}

// ==================== UTILS ====================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function switchTab(name) {
  const tabs = ['add', 'sold', 'myids'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', tabs[i] === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${name}`));
}

let toastTimer;
function toast(msg, type = 'ok') {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = `toast ${type} show`;
  toastTimer = setTimeout(() => t.className = `toast ${type}`, 3000);
}

// ==================== INIT ====================
(async () => {
  if (!checkAuth()) return;
  GH_TOKEN = getToken();
  if (!GH_TOKEN) alert('Token GitHub diperlukan!');
  await loadMyIds();
  document.getElementById('navUserBtn').onclick = openProfileModal;
})();
</script>
</body>
</html>
