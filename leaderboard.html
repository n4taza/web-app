<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard — IDglitxh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --bg2:#111111;
  --card:#161616;
  --card2:#1a1a1a;
  --border:#232323;
  --border2:#2a2a2a;
  --text:#f0f0f0;
  --muted:#666;
  --muted2:#888;
  --white:#fff;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --gold:#fbbf24;
  --silver:#d1d5db;
  --bronze:#fb923c;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:80px 20px 40px;
  position:relative;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* BACKGROUND GLOW */
.bg-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 65%);pointer-events:none;z-index:0}
.bg-glow2{position:fixed;top:20%;left:20%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.025) 0%,transparent 65%);pointer-events:none;z-index:0}
.bg-glow3{position:fixed;bottom:10%;right:15%;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.02) 0%,transparent 65%);pointer-events:none;z-index:0}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(13,13,13,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:.95rem;font-weight:700;color:var(--white);text-decoration:none}
.nav-logo-icon{width:24px;height:24px;background:var(--white);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#000;font-weight:900}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-link{font-size:.82rem;color:var(--muted2);text-decoration:none;transition:color .2s;font-weight:400}
.nav-link:hover{color:var(--white)}
.nav-link.active{color:var(--white)}

/* LOADER */
#loadingState{position:relative;z-index:1;text-align:center;color:var(--muted);font-family:var(--mono);font-size:.78rem}
.spinner{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--white);animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE PILL */
.page-pill{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border2);padding:.3rem .9rem;border-radius:99px;font-size:.72rem;color:var(--muted2);margin-bottom:28px;animation:fadeUp .6s ease both;position:relative;z-index:1}
.page-pill-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LEADERBOARD WRAP */
.leader-wrap{position:relative;z-index:1;max-width:800px;width:100%;animation:fadeUp .6s .08s ease both}

/* HEADER STATS */
.stats-header{display:flex;justify-content:space-between;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:16px;text-align:center}
.stat-card-value{font-size:2rem;font-weight:800;color:var(--white);font-family:var(--mono);letter-spacing:-1px}
.stat-card-label{font-size:.68rem;color:var(--muted2);margin-top:4px;text-transform:uppercase;letter-spacing:1px}

/* LEADERBOARD TABLE */
.leader-panel{background:var(--card);border:1px solid var(--border2);border-radius:20px;overflow:hidden}
.leader-header{display:grid;grid-template-columns:80px 1fr 100px;padding:16px 20px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border2);font-size:.7rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:1px}
.leader-list{max-height:520px;overflow-y:auto;scrollbar-width:thin}
.leader-list::-webkit-scrollbar{width:4px}
.leader-list::-webkit-scrollbar-track{background:transparent}
.leader-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.leader-row{
  display:grid;
  grid-template-columns:80px 1fr 100px;
  align-items:center;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  transition:all .2s;
  cursor:pointer;
  text-decoration:none;
  color:var(--text);
}
.leader-row:hover{background:var(--card2);transform:translateX(4px)}

/* RANK STYLES */
.rank{font-family:var(--mono);font-weight:700;font-size:1.1rem}
.rank-1{color:var(--gold);text-shadow:0 0 8px rgba(251,191,36,.3)}
.rank-2{color:var(--silver)}
.rank-3{color:var(--bronze)}
.rank-other{color:var(--muted2)}

/* CONTRIBUTOR INFO */
.contributor-info{display:flex;align-items:center;gap:12px}
.leader-avatar{width:40px;height:40px;border-radius:50%;border:1px solid var(--border2);background:var(--card2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:var(--muted);flex-shrink:0}
.leader-avatar img{width:100%;height:100%;object-fit:cover}
.leader-name{font-weight:600;color:var(--white);font-size:.9rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.leader-usn{font-size:.67rem;color:var(--muted2);font-family:var(--mono);margin-top:2px}

/* ROLE BADGE */
.role-badge-sm{font-size:.55rem;font-weight:600;padding:.12rem .45rem;border-radius:12px;font-family:var(--mono)}
.role-dv-sm{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.role-cb-sm{background:rgba(156,163,175,.12);color:#9ca3af;border:1px solid rgba(156,163,175,.2)}

/* TOTAL ID */
.total-id{font-family:var(--mono);font-weight:700;font-size:1rem;color:var(--white);text-align:right}
.total-id-label{font-size:.58rem;color:var(--muted);margin-top:2px;text-align:right}

/* PODIUM (TOP 3) */
.podium{display:flex;justify-content:center;align-items:flex-end;gap:20px;margin-bottom:40px;padding:20px 0}
.podium-item{text-align:center;cursor:pointer;transition:all .2s}
.podium-item:hover{transform:translateY(-4px)}
.podium-avatar{width:70px;height:70px;border-radius:50%;border:2px solid var(--border2);background:var(--card2);overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.podium-avatar img{width:100%;height:100%;object-fit:cover}
.podium-rank{font-family:var(--mono);font-weight:800;font-size:1.2rem;margin-bottom:6px}
.podium-rank.gold{color:var(--gold)}
.podium-rank.silver{color:var(--silver)}
.podium-rank.bronze{color:var(--bronze)}
.podium-name{font-size:.85rem;font-weight:600;color:var(--white)}
.podium-usn{font-size:.65rem;color:var(--muted2);font-family:var(--mono)}
.podium-count{font-size:.7rem;color:var(--muted);margin-top:4px}

/* FOOTER */
.back-link{margin-top:28px;text-align:center;position:relative;z-index:1}
.back-link a{color:var(--muted);font-size:.75rem;text-decoration:none;transition:color .2s;display:inline-flex;align-items:center;gap:6px}
.back-link a:hover{color:var(--white)}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

@media(max-width:768px){
  nav{padding:0 20px}
  .nav-links{display:none}
  .leader-header{grid-template-columns:60px 1fr 80px;padding:12px 16px}
  .leader-row{grid-template-columns:60px 1fr 80px;padding:12px 16px}
  .rank{font-size:.9rem}
  .leader-avatar{width:32px;height:32px}
  .leader-name{font-size:.8rem}
  .podium{gap:12px}
  .podium-avatar{width:55px;height:55px}
  .podium-rank{font-size:1rem}
  .podium-name{font-size:.75rem}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="bg-glow3"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">ID</div>
    IDglitxh
  </a>
  <div class="nav-links">
    <a href="index.html#scores" class="nav-link">Koleksi</a>
    <a href="index.html#fitur" class="nav-link">Fitur</a>
    <a href="index.html#stok" class="nav-link">Stok</a>
    <a href="contact.html" class="nav-link">Contact</a>
  </div>
</nav>

<div class="page-pill">
  <div class="page-pill-dot"></div>
  <span>Contributor Leaderboard</span>
</div>

<div class="leader-wrap">
  
  <!-- STATS HEADER -->
  <div class="stats-header" id="statsHeader">
    <div class="stat-card">
      <div class="stat-card-value" id="totalContributors">—</div>
      <div class="stat-card-label">Total Contributor</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-value" id="totalIDs">—</div>
      <div class="stat-card-label">Total ID Keseluruhan</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-value" id="avgIDs">—</div>
      <div class="stat-card-label">Rata-rata ID/Contributor</div>
    </div>
  </div>

  <!-- PODIUM TOP 3 -->
  <div id="podiumContainer" style="display:none"></div>

  <!-- LEADERBOARD TABLE -->
  <div class="leader-panel">
    <div class="leader-header">
      <span>RANK</span>
      <span>CONTRIBUTOR</span>
      <span style="text-align:right">TOTAL ID</span>
    </div>
    <div class="leader-list" id="leaderList">
      <div style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:.78rem">
        <div class="spinner"></div>
        Memuat leaderboard...
      </div>
    </div>
  </div>

  <div class="back-link">
    <a href="index.html">← Kembali ke Beranda</a>
  </div>
</div>

<script>
const CON_JSON_URL = 'https://raw.githubusercontent.com/n4taza/web-app/main/contributor/contributor.json';
const BASE_RAW = 'https://raw.githubusercontent.com/n4taza/web-app/main';

async function fetchJSON(url) {
  try {
    const r = await fetch(url + '?_=' + Date.now());
    if (!r.ok) return null;
    const text = await r.text();
    return JSON.parse(text);
  } catch { return null; }
}

async function loadLeaderboard() {
  const contributors = await fetchJSON(CON_JSON_URL);
  if (!contributors || !Array.isArray(contributors) || contributors.length === 0) {
    document.getElementById('leaderList').innerHTML = `
      <div style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:.78rem">
        ⚠️ Belum ada contributor terdaftar.
      </div>`;
    return;
  }

  // Urutkan berdasarkan total ID (terbanyak ke terkecil)
  const sorted = [...contributors].sort((a, b) => (b.total || 0) - (a.total || 0));
  
  // Hitung statistik
  const totalContributors = sorted.length;
  const totalIDsAll = sorted.reduce((sum, c) => sum + (c.total || 0), 0);
  const avgIDs = totalContributors > 0 ? Math.round(totalIDsAll / totalContributors) : 0;
  
  document.getElementById('totalContributors').textContent = totalContributors;
  document.getElementById('totalIDs').textContent = totalIDsAll.toLocaleString('id-ID');
  document.getElementById('avgIDs').textContent = avgIDs.toLocaleString('id-ID');

  // Render Podium (Top 3)
  renderPodium(sorted.slice(0, 3));
  
  // Render Leaderboard List
  renderLeaderList(sorted);
}

function renderPodium(top3) {
  const podiumContainer = document.getElementById('podiumContainer');
  if (top3.length === 0) {
    podiumContainer.style.display = 'none';
    return;
  }
  
  podiumContainer.style.display = 'flex';
  podiumContainer.className = 'podium';
  
  const medals = ['gold', 'silver', 'bronze'];
  const ranks = ['#1', '#2', '#3'];
  
  podiumContainer.innerHTML = top3.map((con, idx) => {
    const medalClass = medals[idx];
    const rankLabel = ranks[idx];
    const avatarHtml = con.photo 
      ? `<img src="${con.photo}" alt="${con.name}" onerror="this.parentElement.innerHTML='${(con.username||'?').charAt(0).toUpperCase()}'">`
      : `<span style="font-size:1.2rem;font-weight:700">${(con.username||'?').charAt(0).toUpperCase()}</span>`;
    
    return `
      <div class="podium-item" onclick="location.href='contributor/contributor.html?u=${encodeURIComponent(con.username)}'">
        <div class="podium-avatar">${avatarHtml}</div>
        <div class="podium-rank ${medalClass}">${rankLabel}</div>
        <div class="podium-name">${con.name}</div>
        <div class="podium-usn">@${con.username}</div>
        <div class="podium-count">${(con.total || 0).toLocaleString('id-ID')} ID</div>
      </div>
    `;
  }).join('');
}

function renderLeaderList(sorted) {
  const container = document.getElementById('leaderList');
  
  if (sorted.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">Belum ada contributor.</div>`;
    return;
  }
  
  container.innerHTML = sorted.map((con, idx) => {
    const rank = idx + 1;
    let rankClass = 'rank-other';
    let rankIcon = '';
    if (rank === 1) { rankClass = 'rank-1'; rankIcon = '👑 '; }
    else if (rank === 2) rankClass = 'rank-2';
    else if (rank === 3) rankClass = 'rank-3';
    
    const role = con.role || 'CB';
    const roleClass = role === 'DV' ? 'role-dv-sm' : 'role-cb-sm';
    const roleLabel = role === 'DV' ? 'DV' : 'CB';
    
    const avatarHtml = con.photo
      ? `<img src="${con.photo}" alt="${con.name}" onerror="this.parentElement.innerHTML='${(con.username||'?').charAt(0).toUpperCase()}'">`
      : `<span style="font-size:.8rem;font-weight:700">${(con.username||'?').charAt(0).toUpperCase()}</span>`;
    
    // Verified badge hanya untuk lounie di leaderboard (opsional)
    const verifiedMark = con.username.toLowerCase() === 'lounie' 
      ? `<span style="display:inline-block;width:14px;height:14px;margin-left:3px"><img src="https://img.icons8.com/?size=100&id=98A4yZTt9abw&format=png&color=000000" style="width:100%;height:100%;object-fit:contain" alt="verified"/></span>`
      : '';
    
    return `
      <a class="leader-row" href="contributor/contributor.html?u=${encodeURIComponent(con.username)}">
        <div class="rank ${rankClass}">${rankIcon}${rank}</div>
        <div class="contributor-info">
          <div class="leader-avatar">${avatarHtml}</div>
          <div>
            <div class="leader-name">
              ${con.name}
              <span class="role-badge-sm ${roleClass}">${roleLabel}</span>
              ${verifiedMark}
            </div>
            <div class="leader-usn">@${con.username}</div>
          </div>
        </div>
        <div class="total-id">
          ${(con.total || 0).toLocaleString('id-ID')}
          <div class="total-id-label">ID</div>
        </div>
      </a>
    `;
  }).join('');
}

loadLeaderboard();
</script>
</body>
</html>
